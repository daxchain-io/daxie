# keystore state class + the keystore passphrase.
#
# PLACEHOLDERS — replace the base64 values with real material (and prefer an external
# secret store / sealed-secrets in production; do NOT commit real keys). The keystore is
# mounted READ-ONLY at runtime; the passphrase is surfaced as a FILE via
# DAXIE_PASSPHRASE_FILE (never DAXIE_PASSPHRASE, never a flag value).
#
# IMPORTANT: the keystore is a DIRECTORY, not just keystore.json + meta.json. A real
# deployment must provide every file in the keystore backup: keystore.json, meta.json,
# wallets/<uuid>.json, accounts/UTC--..., and index.lock. Kubernetes Secret data keys
# are flat, so docs/deploy/k8s/deployment.yaml maps the flat keys below into nested
# paths with secret.items[].path. For production, prefer an external secret sync / CSI
# store or a restored full-directory PVC so newly added wallets/accounts cannot be
# missed by hand-maintained YAML.
#
# The ADMIN passphrase is deliberately NOT here — it never enters the agent pod. Policy
# administration runs out-of-band from a Job/workstation (see policy-k8s.md).
apiVersion: v1
kind: Secret
metadata:
  name: daxie-keystore
  labels:
    app.kubernetes.io/name: daxie
type: Opaque
data:
  # Complete keystore directory contents, base64-encoded. Mounted read-only at
  # /var/lib/daxie/keystore by deployment.yaml's explicit item path mapping.
  keystore.json: UkVQTEFDRV9NRQ== # "REPLACE_ME"
  meta.json: UkVQTEFDRV9NRQ== # "REPLACE_ME"
  wallet_REPLACE_WITH_WALLET_UUID_json: UkVQTEFDRV9NRQ== # wallets/<uuid>.json
  account_REPLACE_WITH_UTC_KEY: UkVQTEFDRV9NRQ== # accounts/UTC--...
  index.lock: "" # empty lock file placeholder
---
apiVersion: v1
kind: Secret
metadata:
  name: daxie-passphrase
  labels:
    app.kubernetes.io/name: daxie
type: Opaque
stringData:
  # A >=128-bit keystore passphrase. Surfaced as a file via DAXIE_PASSPHRASE_FILE.
  # One trailing newline is tolerated (Daxie strips exactly one).
  passphrase: "REPLACE_WITH_A_STRONG_KEYSTORE_PASSPHRASE"

# Pre-merge CI (design §9.5). All third-party actions are SHA-pinned (dependabot
# bumps them). CGO is off everywhere (pure-Go deps, §9.4).
#
# Jobs:
#   lint              - gofmt diff, go vet, golangci-lint (incl. depguard matrix), go-arch-lint
#   test              - go test -race ./... on ubuntu (incl. arch_test.go + determinism_test.go)
#   test-cross-os     - go test ./... on macos + windows + windows-arm64 (the *_unix/_windows code)
#   cross-compile     - go build ./cmd/daxie for all six GOOS/GOARCH with CGO_ENABLED=0
#   govulncheck       - govulncheck ./...
#   goreleaser-snapshot - goreleaser build --snapshot --clean (the six-target gate)
#   demo              - docs/demos/m00.sh runs unmodified, exits 0 (the §10.1 gate)
#
# The anvil integration job (§9.5) debuts at M2 (chain) — placeholder left below.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26"
  CGO_ENABLED: "0"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: gofmt (fail on diff)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"; echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.1.6
      - name: go-arch-lint
        run: |
          go install github.com/fe3dback/go-arch-lint@latest
          "$(go env GOPATH)/bin/go-arch-lint" check

  test:
    name: test (race, ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: go test -race
        # -race requires cgo; scope the override to this step only (the binaries we
        # ship are still built CGO_ENABLED=0 in cross-compile / goreleaser).
        env:
          CGO_ENABLED: "1"
        run: go test -race -coverprofile=coverage.txt ./...

  test-cross-os:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, windows-11-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: go test
        # Exercises the *_windows.go / *_unix.go fsx/secret/config build-tagged code —
        # keystore perms, path resolution, and file-locking differ exactly per OS.
        run: go test ./...

  cross-compile:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [darwin, linux, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: go build (CGO off)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -buildvcs=false ./cmd/daxie

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  goreleaser-snapshot:
    name: goreleaser build --snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # goreleaser needs tags/history for version templating
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552 # v6.3.0
        with:
          version: "~> v2"
          args: build --snapshot --clean

  demo:
    name: m00 demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: build daxie
        run: go build -o daxie ./cmd/daxie
      - name: run docs/demos/m00.sh unmodified
        run: |
          chmod +x docs/demos/m00.sh
          DAXIE="$PWD/daxie" docs/demos/m00.sh

  demo-m01:
    name: m01 demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: build daxie
        run: go build -o daxie ./cmd/daxie
      - name: run docs/demos/m01.sh unmodified
        # The M1 keystore/wallet/account acceptance demo (§10.1 gate): create/
        # import/derive/alias/list/show/export round-trips + change-passphrase +
        # the §5.7 exit codes (0/2/4/10), all non-interactive (DAXIE_PASSPHRASE_FILE
        # + --mnemonic-file/--key-file + --yes), light KDF for speed.
        run: |
          chmod +x docs/demos/m01.sh
          DAXIE="$PWD/daxie" docs/demos/m01.sh

  # ── M2: anvil integration (//go:build integration; internal/testchain helper) ──
  integration:
    name: anvil integration
    runs-on: ubuntu-latest
    env:
      # CI MUST actually run anvil — a missing binary is a hard failure, never a
      # silent skip (internal/testchain.Spawn honors this).
      DAXIE_IT_REQUIRE_ANVIL: "1"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - uses: foundry-rs/foundry-toolchain@de808b1eea699e761c404bda44ba8f21aba30b2c # v1.3.1
      - name: anvil --version
        run: anvil --version
      - name: go test -tags integration
        # Integration tests use the real chain adapter against a local anvil:
        # M2's chain-id verification + balance, M3's full tx pipeline
        # (internal/service/tx_integration_test.go service scenarios +
        # internal/cli/tx_integration_test.go cli-level send→wait→status→list→
        # speedup/cancel→gas), and M5's ERC-20 surface against a freshly-deployed test
        # token (internal/testchain/erc20.go deploy + raw-RPC readers; the
        # internal/service/token_integration_test.go + internal/cli/token_integration_test.go
        # scenarios: token add → balance --token == on-chain → tx send --token →
        # approve/allowance/revoke → balance --all, plus the fail-closed-no-allowlist
        # deny exit 3 and the policy-dest-is-the-recipient invariant), and M6's NFT
        # surface against freshly-deployed test ERC-721/1155 collections
        # (internal/testchain/erc721.go + erc1155.go deploy/mint + raw-RPC readers; the
        # internal/service/nft_integration_test.go scenarios: nft add → ERC-165
        # detection (721 vs 1155; non-NFT rejected) → nft send (721 ownerOf moves; 1155
        # balanceOf moves --amount) → nft show, plus the fail-closed-no-allowlist NFT
        # send deny exit 3 — ETH exempt, NFT NOT — and the policy-dest-is-the-recipient
        # invariant), and M7's ENS surface against a freshly-deployed MOCK ENS registry
        # +resolver (internal/testchain/ens.go + ensbytecode.go deploy/setAddr/setName +
        # raw-RPC readers; the mock is injected as the chain-31337 registry via the
        # integration-only ens.SetTestRegistry hook). The
        # internal/service/ens_integration_test.go + internal/cli/ens_integration_test.go
        # scenarios: ens resolve == on-chain addr → tx send --to name.eth lands at the
        # resolved address (echoed before signing) → policy allow name.eth pins
        # name+resolved-addr+resolved-at, a matching-pin send confirms, then RE-POINTING
        # the resolver makes the next send DENY policy.denied.pin_drift (reason ens_drift,
        # exit 3, nothing signed — the §4.3 stage-4 gate M7 activates) → reverse is
        # forward-verified (a broken forward record yields an unverified empty name), and
        # M8's `daxie receive` inbound-detection engine against anvil with a CONCURRENT
        # sender (internal/cli/receive_integration_test.go: a streaming-pipe harness runs
        # `receive --json` in a goroutine, waits for the up-front `listening` line — the
        # address-up-front + ETH-baseline-captured signal — then concurrently pays, and
        # asserts the stream reaches the terminal `complete` exit 0 with the right
        # cumulative + attribution; covers ETH cumulative (single + multi-payment), an
        # ERC-20 log-detection receive, a --new fresh-address invoice receive, and the
        # no-payment → terminal `timeout` exit 8 with an executable, statelessly-resumable
        # resume string), and M9's gasless sign/verify surface against a freshly-deployed
        # EIP-2612 permit token (internal/testchain/erc2612.go + erc2612bytecode.go
        # deploy + Permit712 typed-data builder + raw-RPC nonces/allowance readers +
        # SubmitPermit; the internal/cli/sign_integration_test.go scenarios: the REAL
        # permit roundtrip — `sign typed` an allowlisted EIP-2612 Permit → submit it to
        # the token's on-chain permit() → assert allowance == value (the executable proof
        # a Daxie-signed permit is a valid, fund-moving authorization); a sign message +
        # verify roundtrip (correct ⇒ valid exit 0; wrong address ⇒ mismatch exit 2 with
        # the recovered address; --no-hash digest roundtrip); a permit to a NON-allowlisted
        # spender DENIED at SIGNATURE time (exit 3, nothing signed, allowance stays 0); an
        # unknown EIP-712 message DENIED typed_data.unknown, then OPENED by `policy typed
        # allow` and DENIED again after `policy typed remove`; a wrong-chainId permit
        # DENIED chain_mismatch). The
        # `./...` +
        # `-tags integration` already compiles and runs every //go:build integration
        # file, so the M3+M5+M6+M7+M8+M9 tests are covered without a new job; CGO=1 so
        # -race is available on the one job that talks to a real EVM (shipped binaries
        # stay CGO_ENABLED=0).
        env:
          CGO_ENABLED: "1"
        run: go test -race -tags integration ./...

  demo-m02:
    name: m02 demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - uses: foundry-rs/foundry-toolchain@de808b1eea699e761c404bda44ba8f21aba30b2c # v1.3.1
      - name: build daxie
        run: go build -o daxie ./cmd/daxie
      - name: run docs/demos/m02.sh unmodified
        # The M2 network/rpc/balance acceptance demo (§10.1 gate): network
        # list/add/use/show/remove; rpc add/list/show/use/test/rename/remove with
        # secret-ref masking + chain-id verification; balance of a raw 0x against a
        # local anvil; --json variants; the §5.7 exit codes (0/2/10/12). anvil is on
        # PATH (foundry-toolchain) so the live balance/rpc-test paths run.
        run: |
          chmod +x docs/demos/m02.sh
          DAXIE="$PWD/daxie" docs/demos/m02.sh

  demo-m03:
    name: m03 demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - uses: foundry-rs/foundry-toolchain@de808b1eea699e761c404bda44ba8f21aba30b2c # v1.3.1
      - name: build daxie
        run: go build -o daxie ./cmd/daxie
      - name: run docs/demos/m03.sh unmodified
        # The M3 tx-pipeline/gas/contacts acceptance demo (§10.1 gate): contacts
        # add/list/show/remove; tx send→wait→status→list with exact recipient
        # balance + nonce sequencing; speedup/cancel RBF surface (already-mined
        # exit 9, unknown-hash exit 10); wait timeout (exit 8, resumable); gas live
        # three-speed quote; --to a contact name resolving; --json variants; the
        # §5.7 exit codes (0/2/8/9/10). anvil is on PATH (foundry-toolchain) so the
        # live send/gas/RBF paths run. v0.3.0 ships the always-allow policy STUB, so
        # no exit-3 policy assertion here (that lands in m04.sh).
        run: |
          chmod +x docs/demos/m03.sh
          DAXIE="$PWD/daxie" docs/demos/m03.sh

  demo-m04:
    name: m04 demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - uses: foundry-rs/foundry-toolchain@de808b1eea699e761c404bda44ba8f21aba30b2c # v1.3.1
      - name: build daxie
        run: go build -o daxie ./cmd/daxie
      - name: run docs/demos/m04.sh unmodified
        # The M4 policy-keystone acceptance demo (§10.1 gate, v0.4.0): policy
        # bootstrap (first `set` creates the anchor) + show/verify/allow/deny/check;
        # wrong admin passphrase ⇒ exit 8 admin_auth; a tampered policy.json ⇒ verify
        # exit 8 seal_violation; reset --force authenticates against the anchor (wrong
        # pass ⇒ exit 8); pin --print/--verify; the §4.6 Viper carve-out; staged
        # change-admin-passphrase. LIVE (anvil on PATH via foundry-toolchain): a send
        # over max_tx ⇒ exit 3 tx_limit (nothing signed), an allowlisted send ⇒ exit 0
        # (balance moves), a non-allowlisted dest ⇒ exit 3 allowlist, a gas-cap refusal
        # ⇒ exit 3 gas_cap (current_base_fee in the payload). This is the FIRST demo
        # that asserts exit-3 policy denials — guardrails now exist.
        run: |
          chmod +x docs/demos/m04.sh
          DAXIE="$PWD/daxie" docs/demos/m04.sh

  demo-m05:
    name: m05 demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - uses: foundry-rs/foundry-toolchain@de808b1eea699e761c404bda44ba8f21aba30b2c # v1.3.1
      - name: build daxie
        run: go build -o daxie ./cmd/daxie
      - name: run docs/demos/m05.sh unmodified
        # The M5 token acceptance demo (§10.1 gate, v0.5.0): the token registry +
        # ERC-20 transfers/approvals. DRY: token list shows the bundled majors; an
        # unregistered alias ⇒ exit 10 ref.not_found (the anti-spoofing wall — NEVER an
        # on-chain symbol() lookup); balance --token + --all is a usage error; an
        # --unlimited approve without --yes ⇒ exit 2 (the ceremony). LIVE (anvil on PATH
        # via foundry-toolchain): deploy a test ERC-20 (via anvil's unlocked dev
        # account), token add, balance --token == on-chain, tx send --token (recipient
        # receives it), approve/allowance/revoke, balance --all, and a fail-closed-no-
        # allowlist token transfer ⇒ exit 3 policy.denied.no_allowlist (nothing signed).
        run: |
          chmod +x docs/demos/m05.sh
          DAXIE="$PWD/daxie" docs/demos/m05.sh

  demo-m06:
    name: m06 demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - uses: foundry-rs/foundry-toolchain@de808b1eea699e761c404bda44ba8f21aba30b2c # v1.3.1
      - name: build daxie
        run: go build -o daxie ./cmd/daxie
      - name: run docs/demos/m06.sh unmodified
        # The M6 NFT acceptance demo (§10.1 gate, v0.6.0): ERC-721 + ERC-1155.
        # DRY: an unregistered collection alias ⇒ exit 10 ref.not_found (the
        # anti-spoofing wall — NEVER an on-chain name() lookup); `nft send` without
        # --to/--nft ⇒ exit 2. LIVE (anvil on PATH via foundry-toolchain): deploy a
        # test ERC-721 + ERC-1155, mint, nft add (ERC-165 detection: 721 vs 1155
        # stored; a non-NFT ⇒ exit 2 usage.not_nft), nft alias/aliases, nft send (721:
        # ownerOf moves to the recipient; 1155 --amount 5: balanceOf moves), nft
        # show/list, and a fail-closed-no-allowlist NFT send ⇒ exit 3
        # policy.denied.no_allowlist (ETH exempt, NFT NOT; nothing signed).
        run: |
          chmod +x docs/demos/m06.sh
          DAXIE="$PWD/daxie" docs/demos/m06.sh

  demo-m07:
    name: m07 demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - uses: foundry-rs/foundry-toolchain@de808b1eea699e761c404bda44ba8f21aba30b2c # v1.3.1
      - name: build daxie
        run: go build -o daxie ./cmd/daxie
      - name: run docs/demos/m07.sh unmodified
        # The M7 ENS acceptance demo (§10.1 gate, v0.7.0): ENS resolution + the
        # allowlist pin-drift refusal. DRY: `ens resolve|reverse` exist; a reverse of a
        # non-address ⇒ exit 2. LIVE (anvil + cast on PATH via foundry-toolchain):
        # start anvil as chain-id 1 and plant a mock ENS at the canonical registry
        # address via anvil_setCode (so the shipped binary's RegistryFor(1) finds it),
        # register a name, `ens resolve` == the registered addr, an unregistered name ⇒
        # exit 10 ref.not_found, `tx send --to name.eth` lands at the resolved address
        # (echoed before signing), `policy allow name.eth` pins name+resolved-addr, a
        # matching-pin send confirms, then RE-POINTING the name ⇒ the next send DENIES
        # policy.denied.pin_drift (exit 3, nothing signed). Asserts §5.7 codes 0/2/3/10.
        run: |
          chmod +x docs/demos/m07.sh
          DAXIE="$PWD/daxie" docs/demos/m07.sh

  demo-m08:
    name: m08 demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - uses: foundry-rs/foundry-toolchain@de808b1eea699e761c404bda44ba8f21aba30b2c # v1.3.1
      - name: build daxie
        run: go build -o daxie ./cmd/daxie
      - name: run docs/demos/m08.sh unmodified
        # The M8 receive acceptance demo (§10.1 gate, v0.8.0): the `daxie receive`
        # inbound-detection engine + the NDJSON event stream. DRY: the command + the
        # full flag set exist; --token+--nft together and --exact without --amount ⇒
        # exit 2; --new without --wallet ⇒ exit 2. LIVE (anvil + curl on PATH via
        # foundry-toolchain): start a throwaway anvil (chain-id 31337, confirmations 1),
        # import the funded dev key, an unknown account ref ⇒ exit 10 ref.not_found, then
        # the CONCURRENT-payment path — run `receive --json` in the background, wait for
        # its up-front {"event":"listening","address":…,"v":1} line (the address-up-front
        # guarantee + the ETH-baseline-captured signal), pay 0.5 ETH from `funded`, and
        # assert the stream reaches the terminal {"event":"complete","exit":0} with
        # cumulative_confirmed == 500000000000000000 and an attribution:"tx" detection.
        # Finally a bounded receive with NO payment ⇒ the terminal
        # {"event":"timeout","exit":8} carrying remaining at full precision +
        # an executable `daxie receive … --from-block … --amount …` resume string.
        # Asserts §5.7 codes 0/2/8/10.
        run: |
          chmod +x docs/demos/m08.sh
          DAXIE="$PWD/daxie" docs/demos/m08.sh

  demo-m09:
    name: m09 demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - uses: foundry-rs/foundry-toolchain@de808b1eea699e761c404bda44ba8f21aba30b2c # v1.3.1
      - name: build daxie
        run: go build -o daxie ./cmd/daxie
      - name: run docs/demos/m09.sh unmodified
        # The M9 gasless-signing acceptance demo (§10.1 gate, v0.9.0): `daxie sign
        # message` (EIP-191) / `sign typed` (EIP-712) / `verify` / `policy typed
        # allow|remove`. DRY: the commands + full flag set exist; ambiguous message
        # sources, a bad --no-hash digest, --unlimited without --yes, a two-scheme
